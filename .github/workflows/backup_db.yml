name: Backup database

on:
  schedule:
    - cron: "17 3 * * *" # daily
  # Allows running this workflow manually from the Actions tab
  workflow_dispatch:

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  PGPASSWORD: ${{ secrets.PGPASSWORD }}
  UV_SYSTEM_PYTHON: 1

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Get flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: dump the database
        run: |
          flyctl proxy 5432:5432 -a zootable-na-db &
          PROXY_PID=$!

          # Wait for proxy to be ready
          sleep 5
          for i in {1..30}; do
            if pg_isready -h localhost -U na_zootable -d zootable; then
              echo "Database proxy is ready"
              break
            fi
            echo "Waiting for database proxy... ($i/30)"
            sleep 2
          done

          docker run --rm --network host \
            -v $(pwd):$(pwd) \
            -w $(pwd) \
            -e PGPASSWORD=$PGPASSWORD \
            postgres:14-alpine \
            pg_dump -Fc -h localhost -U na_zootable zootable > zootable.dump

            kill $PROXY_PID || true

      - name: upload the db dump to dropbox
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
        run: |
          uv pip install dropbox python-dotenv
          python scripts/uploader.py zootable.dump /zootable.dump
